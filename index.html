<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESP32 Remote Control Car</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background">

<div class="card">

<div class="car-icon">
    <img src="assets/logo.png" alt="ESP32 RC Car Logo">
</div>

<h1>ESP32 Remote Control Car</h1>

<p class="powered">
Powered by ESP32
</p>

<p class="subtitle">
Connect your car to Wi-Fi
</p>

<div class="input-group">

<label>
Wi-Fi Name:
</label>

<input
type="text"
id="ssid"
placeholder="Enter Wi-Fi Name">

</div>

<div class="input-group">

<label>
Wi-Fi Password:
</label>

<input
type="password"
id="password"
placeholder="Enter Wi-Fi Password">

</div>

<button id="saveBtn">

Save & Restart

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
